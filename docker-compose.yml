services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: portafolio
      POSTGRES_USER: ${POSTGRES_USER:-portafolio}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-portafolio}"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-portafolio}:${POSTGRES_PASSWORD}@db:5432/portafolio
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      PORT: 3001
      CORS_ORIGIN: ${CORS_ORIGIN:-*}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@divmalcentrado.dev}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:?ADMIN_PASSWORD is required}
    expose:
      - "3001"

  frontend:
    build:
      context: ./frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "${PORT:-80}:80"

volumes:
  postgres_data:
